<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>An app for selling products</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main>
      <div class="container my-5">
        <div class="row mb-4">
          <div class="col-12">
            <h1 class="fw-bold">Shopping List Tracker</h1>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-md-4">
            <div class="card shadow p-4">
              <h3 class="h5 fw-bold mb-4">Add New project</h3>

              <div class="mb-3">
                <label
                  for="itemName"
                  class="form-label text-secondary fw-semibold"
                  >project Name</label
                >
                <input
                  type="text"
                  id="itemName"
                  class="form-control"
                  placeholder="Enter project name"
                  required
                />
              </div>

              <div class="mb-3">
                <label
                  for="itemQuantity"
                  class="form-label text-secondary fw-semibold"
                  >Quantity</label
                >
                <input
                  type="number"
                  id="itemQuantity"
                  class="form-control"
                  placeholder="Enter the quantity"
                  required
                />
              </div>

              <div class="mb-4">
                <label
                  for="itemPrice"
                  class="form-label text-secondary fw-semibold"
                  >Price per Unit ($)</label
                >
                <input
                  type="number"
                  id="itemPrice"
                  class="form-control"
                  placeholder="0.00"
                  required
                />
              </div>

              <button
                type="button"
                id="addItemBtn"
                class="btn btn-success w-100 py-2 fw-bold"
              >
                Add to List +
              </button>
            </div>
          </div>

          <div class="col-md-8">
            <div class="card shadow p-4 bg-light h-100">
              <h3 class="h5 fw-bold mb-4">Shopping List projects</h3>

              <div id="items-container" class="row g-3 justify-content-center">
                <div
                  id="emptyMessage"
                  class="text-center text-muted py-5 col-12"
                >
                  <i class="bi bi-cart-x mb-2 fs-1 d-block text-secondary"></i>
                  <span class="fw-semibold"
                    >Your shopping list is empty.<br />Add items to get
                    started!</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row mt-4 justify-content-end">
          <div class="col-md-4 col-sm-6">
            <div class="card shadow p-4 text-end">
              <span class="text-secondary fw-semibold mb-2 d-block"
                >Overall Total</span
              >
              <div class="d-flex justify-content-between align-items-center">
                <h4 class="fw-bold m-0">Total Cost:</h4>
                <span id="totalCostDisplay" class="fs-4 fw-bold text-dark"
                  >0.00 AED</span
                >
              </div>
              <small id="itemsCountDisplay" class="text-muted d-block mt-2"
                >Based on 0 items</small
              >
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
