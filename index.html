<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>An app for selling products</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main>
      <div class="container my-5">
        <div class="row mb-4">
        <div class="col-12">
            <h1 class="fw-bold">Shopping List Tracker</h1>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow p-4">
                <h3 class="h5 fw-bold mb-4">Add New Item</h3>
                
                <div class="mb-3">
                    <label for="itemName" class="form-label text-secondary fw-semibold">Product Name</label>
                    <input type="text" id="itemName" class="form-control" placeholder="Enter product name">
                </div>

                <div class="mb-3">
                    <label for="itemQuantity" class="form-label text-secondary fw-semibold">Quantity</label>
                    <input type="number" id="itemQuantity" class="form-control" placeholder="Enter the quantity">
                </div>

                <div class="mb-4">
                    <label for="itemPrice" class="form-label text-secondary fw-semibold">Price per Unit ($)</label>
                    <input type="number" id="itemPrice" class="form-control" placeholder="0.00">
                </div>

                <button type="button" id="addItemBtn" class="btn btn-success w-100 py-2 fw-bold">
                    Add to List +
                </button>
            </div>
        </div>
      </div>
    </main>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
